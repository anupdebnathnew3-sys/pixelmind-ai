<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PixelMind AI</title>
    <!--
      GitHub Pages SPA — single-page app routing fix.
      When GitHub Pages serves a 404, it delivers this page.
      This script encodes the full URL path into the query string,
      then redirects to the root index.html, which decodes it and
      restores the original URL using history.replaceState.

      Set pathSegmentsToKeep = 0 for a custom domain (pixelmindai.com)
      Set pathSegmentsToKeep = 1 for a GitHub Pages subdirectory (/repo-name/)
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
